<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <title>luyj's index</title>
</head>
<body>
    <h1>luyj's index</h1>
    <div id="linkList"></div>

    <script>
        (function() {
            // 把你的 JSONBin 读取 URL 替换到这里
            var dataUrl = 'https://api.jsonbin.io/v3/b/6a506c21f5f4af5e297abb75';

            var xhr = new XMLHttpRequest();
            xhr.open('GET', dataUrl, true);
            // 如果 JSONBin 需要特殊 header（免费版不需要），可忽略
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        var response = JSON.parse(xhr.responseText);
                        // JSONBin 返回的数据在 record 字段里
                        var data = response.record || response; // 兼容不同版本
                        var html = '<ul>';
                        for (var i = 0; i < data.length; i++) {
                            html += '<li><a href="' + data[i].url + '">' + data[i].name + '</a></li>';
                        }
                        html += '</ul>';
                        document.getElementById('linkList').innerHTML = html;
                    } catch(e) {
                        document.getElementById('linkList').innerHTML = '<p>数据加载失败，请稍后重试</p>';
                    }
                }
            };
            xhr.send();
        })();
    </script>

    <!-- 极简降级：若浏览器不支持 JS，显示提示 -->
    <noscript>
         <ul>
            <li><a href="https://firestar0507.github.io/mybilibot/">bilibot-info</a></li>
            <ul><li><a href="https://bilibilibot.worker.luyj.qzz.io">infosource</a></li></ul>
            <li><a href="https://firestar0507.github.io/bilibili-api/">bilibiliapi-docs</a></li>
            <li><a href="https://github.com/FireStar0507/BingWallpaper/blame/main/README.md">bingwallpaper-last</a></li>
        </ul>
    </noscript>
</body>
</html>
